# LiteLLM model routing. Models are NEVER hardcoded in Python — every LLM call
# resolves its model through a role defined here. Swap providers by editing
# this file only.
#
# Roles (cost policy, spec update 2026-07):
#   reasoning : Sonnet — SYNTHESIS ONLY (final signal explanation) plus the
#               interactive chat assistant. Nothing per-candidate runs here.
#   triage    : Haiku — everything cheap and per-candidate: news screening,
#               analyst interpretation (technicals/fundamentals/macro), and
#               the strategy tie-break vote.
#
# Budget: policy.daily_cost_budget_usd is a HARD daily cap enforced in
# sentinel/providers/llm/client.py. When it (or the token backstop) is hit,
# BudgetExceeded is raised and every call site automatically degrades to its
# deterministic fallback — signals are still produced, flagged
# deterministic_only. There is no override.
#
# To use a local Ollama fallback, uncomment the ollama entries and set
# `active` accordingly. No code changes required.

roles:
  reasoning:
    active: anthropic-reasoning
    candidates:
      anthropic-reasoning:
        model: anthropic/claude-sonnet-4-6
        max_tokens: 4096
      # ollama-reasoning:
      #   model: ollama/llama3.1:70b
      #   api_base: http://localhost:11434
      #   max_tokens: 4096

  triage:
    active: anthropic-triage
    candidates:
      anthropic-triage:
        model: anthropic/claude-haiku-4-5
        max_tokens: 1024
      # ollama-triage:
      #   model: ollama/llama3.1:8b
      #   api_base: http://localhost:11434
      #   max_tokens: 1024

# Global LLM call policy
policy:
  request_timeout_seconds: 60
  max_retries: 3
  retry_backoff_base_seconds: 2
  # Hard daily spend cap (USD, UTC day) across all roles. Hitting it flips
  # the pipeline into deterministic-only degraded mode until midnight UTC.
  daily_cost_budget_usd: 0.50
